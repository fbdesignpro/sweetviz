version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: "monthly"

updates:
  # Python dependencies managed by uv (reads pyproject.toml, updates uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"
