name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Exclude incompatible combinations
        # exclude:
        #   - os: windows-latest
        #     python-version: "3.13"

    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --extra test --no-dev

      - name: Run tests with pytest
        run: |
          uv run pytest tests/ -v --cov-report=xml --cov-report=term --cov-report=html -n auto

      - name: Run slow tests (if not on Windows)
        if: matrix.os != 'windows-latest'
        run: |
          uv run pytest tests/ -v -m slow -n auto

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 7

      - name: Upload coverage to Smokeshow
        if: success() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: samuelcolvin/smokeshow@v0.3.0
        with:
          api-key: ${{ secrets.SMOKESHOW_API_KEY }}
          title: "Sweetviz Test Coverage"
          # Only upload for PRs, not for main branch pushes
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: coverage.xml
          base-coverage-file: .smokeshow-base-coverage.json
          # Uncomment to fail PR if coverage drops below threshold
          # fail-under: 80
